<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threads 詐騙封鎖系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #0a0a0a;
            --grid-color: rgba(102, 252, 241, 0.08);
            --primary: #66FCF1;
            --primary-dim: rgba(102, 252, 241, 0.2);
            --danger: #FF2A55;
            --surface: #121212;
            --surface-border: #2a2a2a;
            --text-main: #f4f4f5;
            --text-dim: #8a8d91;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Chakra Petch', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center center;
            position: relative;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.25) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.7;
        }

        h1, h2, h3 {
            font-family: 'Syne', sans-serif;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 2rem;
            position: relative;
            z-index: 10;
        }

        header {
            margin-bottom: 5rem;
            position: relative;
        }

        .system-badge {
            display: inline-block;
            background: var(--primary-dim);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1.glitch {
            font-size: 4rem;
            font-weight: 800;
            color: var(--text-main);
            position: relative;
            display: inline-block;
            line-height: 1.2;
        }

        h1.glitch::before, h1.glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-base);
            opacity: 0.8;
            white-space: nowrap;
        }

        h1.glitch::before {
            left: 3px;
            text-shadow: -2px 0 var(--danger);
            clip: rect(24px, 900px, 90px, 0);
            animation: glitch-anim-1 3s infinite linear alternate-reverse;
        }

        h1.glitch::after {
            left: -3px;
            text-shadow: -2px 0 var(--primary);
            clip: rect(85px, 900px, 140px, 0);
            animation: glitch-anim-2 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip: rect(10px, 9999px, 31px, 0); }
            20% { clip: rect(60px, 9999px, 80px, 0); }
            40% { clip: rect(30px, 9999px, 50px, 0); }
            60% { clip: rect(80px, 9999px, 100px, 0); }
            80% { clip: rect(20px, 9999px, 40px, 0); }
            100% { clip: rect(90px, 9999px, 110px, 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(10px, 9999px, 40px, 0); }
            40% { clip: rect(80px, 9999px, 110px, 0); }
            60% { clip: rect(20px, 9999px, 50px, 0); }
            80% { clip: rect(70px, 9999px, 90px, 0); }
            100% { clip: rect(30px, 9999px, 60px, 0); }
        }

        .header-desc {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-top: 1rem;
            max-width: 600px;
            border-left: 4px solid var(--danger);
            padding-left: 1rem;
        }

        .panel {
            background: var(--surface);
            border: 2px solid var(--surface-border);
            padding: 3rem;
            margin-bottom: 4rem;
            position: relative;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .panel::after {
            content: '';
            position: absolute;
            top: 8px; left: 8px; width: 100%; height: 100%;
            background: repeating-linear-gradient(45deg, var(--surface-border), var(--surface-border) 2px, transparent 2px, transparent 8px);
            z-index: -1;
            transition: all 0.4s ease;
        }

        .panel:hover {
            border-color: var(--primary);
            transform: translate(-4px, -4px);
        }

        .panel:hover::after {
            top: 12px; left: 12px;
            background: repeating-linear-gradient(45deg, var(--primary-dim), var(--primary-dim) 2px, transparent 2px, transparent 8px);
        }

        .panel h2 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--primary);
            display: inline-block;
            border-bottom: 4px solid var(--danger);
            padding-bottom: 0.5rem;
        }

        .form-row { display: flex; gap: 2rem; margin-bottom: 2rem; }
        @media(max-width: 768px) { .form-row { flex-direction: column; gap: 1.5rem; } }
        .input-group { flex: 1; position: relative; }

        label {
            display: block; margin-bottom: 0.8rem; font-size: 1rem;
            color: var(--text-dim); font-weight: 700;
        }

        input, select {
            width: 100%; background: var(--bg-base);
            border: 1px solid var(--surface-border); color: var(--text-main);
            font-family: 'Chakra Petch', monospace; font-size: 1.1rem;
            padding: 1.2rem; border-radius: 0; outline: none; transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--primary); box-shadow: inset 4px 0 0 var(--primary); background: #000;
        }

        button {
            background: transparent; color: var(--danger);
            border: 2px solid var(--danger); font-family: 'Syne', sans-serif;
            font-size: 1.2rem; font-weight: 800; padding: 1.2rem 3rem;
            cursor: pointer; position: relative; overflow: hidden;
            transition: color 0.3s ease; display: inline-flex; align-items: center; gap: 10px;
        }

        button::before {
            content: ''; position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; background: var(--danger);
            z-index: -1; transform: scaleX(0); transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.86, 0, 0.07, 1);
        }

        button:hover { color: var(--bg-base); }
        button:hover::before { transform: scaleX(1); transform-origin: left; }

        #error-msg { color: var(--danger); font-size: 0.9rem; margin-top: 0.8rem; font-weight: 600; display: none; }

        .table-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .search-box { position: relative; width: 300px; }
        .search-box input { padding-left: 3rem; border-color: var(--surface-border); }
        .search-box::before {
            content: '[]'; position: absolute; left: 1rem; top: 50%;
            transform: translateY(-50%); color: var(--primary); font-weight: 800; font-family: 'Syne', sans-serif;
        }

        .table-wrapper { border: 1px solid var(--surface-border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 1.5rem 1rem; background: #000; color: var(--text-dim); font-family: 'Syne', sans-serif; font-weight: 800; border-bottom: 2px solid var(--surface-border); }
        td { padding: 1.2rem 1rem; border-bottom: 1px solid #1a1a1a; transition: background 0.2s; }
        tr:hover td { background: rgba(255, 255, 255, 0.02); }

        a { color: var(--primary); text-decoration: none; position: relative; }
        a::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 1px; background: var(--primary); transform: scaleX(0); transform-origin: right; transition: transform 0.3s ease; }
        a:hover::after { transform: scaleX(1); transform-origin: left; }

        .badge-reason {
            display: inline-block; border: 1px solid var(--danger);
            color: var(--danger); padding: 0.2rem 0.6rem; font-size: 0.85rem; font-weight: 600;
        }

        .sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .sub-card {
            display: flex; flex-direction: column; border: 1px solid var(--surface-border);
            background: #000; padding: 2rem; text-decoration: none; transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }
        .sub-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: var(--primary); transform: scaleY(0); transition: transform 0.3s ease; transform-origin: bottom;
        }
        .sub-card:hover { border-color: var(--primary); background: rgba(102, 252, 241, 0.03); }
        .sub-card:hover::before { transform: scaleY(1); }
        .sub-card .type { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.5rem; }
        .sub-card .desc { color: var(--text-dim); font-size: 0.95rem; }

        @keyframes brutalSlide {
            0% { opacity: 0; transform: translateY(40px) skewY(2deg); }
            100% { opacity: 1; transform: translateY(0) skewY(0); }
        }

        .stagger-1 { animation: brutalSlide 0.8s cubic-bezier(0.165, 0.84, 0.44, 1) 0.1s both; }
        .stagger-2 { animation: brutalSlide 0.8s cubic-bezier(0.165, 0.84, 0.44, 1) 0.3s both; }
        .stagger-3 { animation: brutalSlide 0.8s cubic-bezier(0.165, 0.84, 0.44, 1) 0.5s both; }
    </style>
</head>
<body>
    <div class="container">
        <header class="stagger-1">
            <h1 class="glitch" data-text="Threads 封鎖防護網">Threads 封鎖防護網</h1>
            <div class="header-desc">
                分散式社群反制系統。全端依賴 Google Sheets 驅動，搭載管理員人工審核機制，確保清單高準確度。
            </div>
        </header>

        <section class="panel stagger-2">
            <h2>[ 舉報可疑目標 ]</h2>
            <form id="report-form">
                <div class="form-row">
                    <div class="input-group">
                        <label>Threads 網址</label>
                        <input type="text" id="url-input" placeholder="https://www.threads.com/@username" required autocomplete="off">
                        <div id="error-msg">無效網址：網址格式錯誤或包含非法路徑 (/post/)。</div>
                    </div>
                    <div class="input-group">
                        <label>違規類別</label>
                        <select id="reason-input">
                            <option value="投資詐騙">投資詐騙</option>
                            <option value="假帳號/機器人">假帳號/機器人</option>
                            <option value="惡意廣告/釣魚">惡意廣告/釣魚</option>
                            <option value="色情/不當內容">色情/不當內容</option>
                            <option value="政治類">政治類</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                </div>
                <button type="submit">
                    <span>執行舉報程序</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </form>
        </section>

        <section class="panel stagger-3">
            <div class="table-controls">
                <h2>[ 資料庫查詢 ]</h2>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="輸入帳號查詢...">
                </div>
            </div>
            
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>使用者帳號</th>
                            <th>違規事項</th>
                            <th>收錄時間</th>
                        </tr>
                    </thead>
                    <tbody id="blocklist-body">
                        <!-- 資料由 JS 填入 -->
                    </tbody>
                </table>
            </div>
        </section>

        <section class="panel stagger-3" style="animation-delay: 0.7s;">
            <h2>[ 系統訂閱源 ]</h2>
            <p style="color: var(--text-dim); margin-bottom: 2rem; max-width: 600px;">
                取得即時更新的封鎖清單，串接至防毒軟體、廣告攔截器 (AdGuard/uBlock) 或自行進行二次開發。
            </p>
            <div class="sub-grid">
                <a id="json-sub-link" href="#" target="_blank" class="sub-card">
                    <div class="type">JSON 格式資料</div>
                    <div class="desc">提供完整屬性與時間戳，適用於開發者 API 串接。</div>
                </a>
                <a id="txt-sub-link" href="#" target="_blank" class="sub-card">
                    <div class="type">TXT 格式資料</div>
                    <div class="desc">純文字網址列陣，適用於網路過濾器直接訂閱。</div>
                </a>
            </div>
        </section>
    </div>

    <script>
        const threadsRegex = /^https?:\/\/(www\.)?threads\.com\/@([a-zA-Z0-9_\.]+)(\/?|\?.*)?$/;

        // 固定寫死的 Google Apps Script Web App 網址
        const sheetsUrl = 'https://script.google.com/macros/s/AKfycbzqLcPOlsONoujtSaBneMvPqBQfsRUs6KLZwlyBqQ6FtUp_B6-BXs9pJ4iu_MYjromfAA/exec';

        // 設定訂閱源連結
        document.getElementById('json-sub-link').href = sheetsUrl;
        document.getElementById('txt-sub-link').href = sheetsUrl + '?format=txt';

        function validateURL(inputUrl) {
            const cleanUrl = inputUrl.trim();
            const match = cleanUrl.match(threadsRegex);
            
            if (cleanUrl.includes('/post/') || cleanUrl.includes('/replies')) {
                return { valid: false, username: null };
            }

            if (match) {
                return { valid: true, username: match[2] };
            }
            return { valid: false, username: null };
        }

        // 提交表單邏輯
        document.getElementById('report-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const urlInput = document.getElementById('url-input').value;
            const reason = document.getElementById('reason-input').value;
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = this.querySelector('button[type="submit"]');

            const validation = validateURL(urlInput);

            if (!validation.valid) {
                errorMsg.style.display = 'block';
                document.getElementById('url-input').style.borderColor = 'var(--danger)';
                return;
            }

            errorMsg.style.display = 'none';
            document.getElementById('url-input').style.borderColor = 'var(--surface-border)';

            const username = validation.username;
            const reasonText = reason.split(' ')[0];

            const originalHTML = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span>傳送中 (UPLOADING)...</span>';
            submitBtn.style.pointerEvents = 'none';

            const now = new Date();
            const addedAt = now.toISOString().split('T')[0];

            try {
                // 使用 text/plain 避免 CORS Preflight
                const response = await fetch(sheetsUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        username: username,
                        url: urlInput.trim(),
                        reason: reasonText,
                        added_at: addedAt
                    })
                });

                const result = await response.json();
                if (result.status === 'success') {
                    alert('✅ 舉報已送出！等待管理員審核後即會顯示於清單中。');
                    document.getElementById('report-form').reset();
                    // 重新載入，但送出的資料狀態是 Pending，不會出現在表中
                    fetchBlocklist(); 
                } else if (result.status === 'exists') {
                    alert('⚠️ 該帳號已在清單中，無須重複舉報。');
                } else {
                    alert('❌ 寫入失敗：' + result.message);
                }
            } catch (error) {
                alert('系統發生錯誤。可能是 Apps Script 異常。');
                console.error(error);
            } finally {
                submitBtn.innerHTML = originalHTML;
                submitBtn.style.pointerEvents = 'auto';
            }
        });

        // 載入清單邏輯
        let blocklistData = [];

        async function fetchBlocklist() {
            const tbody = document.getElementById('blocklist-body');
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:var(--text-dim); padding: 3rem;">連線至資料庫中... (FETCHING)</td></tr>';
            
            try {
                const response = await fetch(sheetsUrl);
                if (response.ok) {
                    blocklistData = await response.json();
                    if (blocklistData.error) throw new Error(blocklistData.error);
                }
                renderTable(blocklistData);
            } catch (error) {
                console.error('Failed to load blocklist', error);
                renderTable([]);
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:var(--danger); padding: 3rem;">連線失敗。無法取得資料庫。</td></tr>';
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('blocklist-body');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:var(--text-dim); padding: 3rem;">系統就緒 // 目前尚無已審核紀錄</td></tr>';
                return;
            }

            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.style.animation = `brutalSlide 0.4s cubic-bezier(0.165, 0.84, 0.44, 1) ${index * 0.05}s backwards`;
                
                tr.innerHTML = `
                    <td style="font-family: 'Chakra Petch', monospace; font-weight: 600;">
                        <a href="${item.url}" target="_blank">@${item.username}</a>
                    </td>
                    <td><span class="badge-reason">${item.reason}</span></td>
                    <td style="color: var(--text-dim); font-size: 0.9rem;">${item.added_at}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().replace('@', '');
            const filtered = blocklistData.filter(item => 
                item.username.toLowerCase().includes(term) || 
                item.reason.toLowerCase().includes(term)
            );
            renderTable(filtered);
        });

        // 初始載入
        fetchBlocklist();
    </script>
</body>
</html>
